<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Limelogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="limelogic-theme.css" />
</head>
<body>
<section class="ll-hero">
  <div class="ll-bg-hill"></div>
  <div class="ll-bg-glow"></div>

  <div class="ll-container ll-hero-grid">
    <div class="ll-copy">
      <div class="ll-logo">
        <div class="ll-logo-mark"></div>
        <span>Limelogic</span>
      </div>

      <h1>AI Chatbots &amp; Voice Agents for Modern Businesses</h1>

      <p>
        Limelogic helps you automate conversations, capture leads,
        and connect with your business tools.
      </p>

      <div class="ll-actions">
        <a class="ll-btn ll-btn-primary" href="#demo">Try Demo</a>
        <a class="ll-btn ll-btn-secondary" href="#contact">Book a Call</a>
      </div>
    </div>

    <div class="ll-mascot-wrap">
      <img class="ll-mascot" src="limelogic-mascot.png" alt="Limelogic mascot" />
    </div>
  </div>

  <div class="ll-bottom-waves">
    <svg viewBox="0 0 1440 420" preserveAspectRatio="none" aria-hidden="true">
      <path fill="#dff0d2" d="M0,280C140,250,280,220,420,220C560,220,700,250,840,240C980,230,1120,180,1260,170C1330,165,1385,168,1440,175V420H0Z"></path>
      <path fill="#d2eac1" fill-opacity="0.82" d="M0,315C180,290,320,245,470,245C650,245,770,300,935,292C1100,284,1230,220,1440,210V420H0Z"></path>
      <path fill="#c2e1a9" fill-opacity="0.65" d="M0,350C160,330,330,300,500,308C640,315,760,355,930,350C1120,345,1260,305,1440,280V420H0Z"></path>
    </svg>
  </div>
</section>
</body>
</html>
