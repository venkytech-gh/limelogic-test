<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Limelogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="limelogic-theme.css" />
</head>
<body>
  <section class="ll-hero">
    <div class="ll-container ll-hero-grid">
      <div class="ll-copy">
        <div class="ll-logo">
          <div class="ll-logo-mark"></div>
          <span>Limelogic</span>
        </div>

        <h1>AI Chatbots & Voice Agents for Modern Businesses</h1>
        <p>
          Limelogic helps you automate conversations, capture leads,
          and connect with your business tools.
        </p>

        <div class="ll-actions">
          <a class="ll-btn ll-btn-primary" href="#">Try Demo</a>
          <a class="ll-btn ll-btn-secondary" href="#">Book a Call</a>
        </div>
      </div>
        <div class="ll-feature-strip">
          <div class="ll-feature-card">
            <strong>AI Chatbots</strong>
          </div>
          <div class="ll-feature-card">
            <strong>Voice Assistants</strong>
          </div>
          <div class="ll-feature-card">
            <strong>CRM Integration</strong>
          </div>
        </div>
      <div class="ll-mascot-wrap">
        <div class="ll-mascot-glow"></div>
        <img class="ll-mascot" src="limelogic-mascot.png" alt="Limelogic mascot" />
      </div>
    </div>

    <img class="ll-wave" src="limelogic-wave.svg" />
  </section>
</body>
</html>
